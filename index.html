<!DOCTYPE html>
<html lang="cs">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VERNISAGUE</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="background"></div>


<div class="container">


<div id="loading">

<h2>INITIALIZING EVENT<span class="cursor">_</span></h2>


<div class="bar">

<div id="progress"></div>

</div>


<p id="status">
LOADING SYSTEM...
</p>


</div>





<div id="main">


<h1>
VERNISAGUE
</h1>


<div class="line"></div>


<p class="date">
25 JULY 2026 • 14:00
</p>




<div id="countdown">


<div>
<span id="days">00</span>
<small>DAYS</small>
</div>


<div>
<span id="hours">00</span>
<small>HOURS</small>
</div>


<div>
<span id="minutes">00</span>
<small>MINUTES</small>
</div>


<div>
<span id="seconds">00</span>
<small>SECONDS</small>
</div>


</div>


</div>



</div>



<script src="script.js"></script>


</body>

</html>
